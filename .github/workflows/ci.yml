name: CI

# Verifies every pull request into main before it can be merged.
# No AWS credentials and no deploy — just typecheck, build, and synth.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (backend, frontend, infra)
        run: npm run typecheck

      - name: Build frontend
        run: npm run build:frontend

      - name: CDK synth (bundles all Lambdas)
        working-directory: infra
        run: npx cdk synth --quiet
